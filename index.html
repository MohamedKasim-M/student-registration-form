<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Student Registration Form </h2>
   <form action="">
        <label for="">Full Name :</label><br>
        <input type="text" placeholder="Enter your name" required>

        <br><br>
        <label for="">Email :</label><br>
        <input type="email" placeholder = "Enter your email" required>

        <br><br>
        <label for="">Password :</label><br>
        <input type="password" required>

        <br><br>
        <label for="">Gender :</label><br>
        <label for="male"> <input type="radio" name = "gender" id = "male" required>Male</label>
        <label for="female"> <input type="radio" name = "gender" id = "female" required>Female</label>

        <br><br>
        <label for="">Skills :</label><br>
        <label for="html"><input type="checkbox" id="html">HTML</label>
        <label for="css"><input type="checkbox" id="css">CSS</label>
        <label for="javascript"><input type="checkbox" id="javascript">JavaScript</label>
 
        <br><br>
        <label for="">D.O.B :</label>
        <input type="date" required>

        <br><br>
        <button type="register">Register</button>
    </form>

    <hr>

</body>
</html>
